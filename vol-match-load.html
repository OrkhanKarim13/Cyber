<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            text-decoration: none;
            list-style: none;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }


        body {
            background-color: #000;
        }

        .header {
            width: 100%;
            padding-top: 40px;
        }

        .container {
            padding: 0 72px;
        }


        .header-content {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lang-selector {
            position: relative;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.12);
            padding: 10px;
            color: #fff;
            border-radius: 8px;
        }

        .lang-dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            background: white;
            border: 1px solid #ddd;
            display: none;
            min-width: 60px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 8px;
        }

        .lang-dropdown div {
            padding: 6px 10px;
            color: color;
        }

        .lang-dropdown div:hover {
            background: #f2f2f2;
            color: #000;
            border-radius: 8px;
        }

        .lang-selector.active .lang-dropdown {
            display: block;
        }

        .right-buttons {
            display: flex;
            align-items: center;
            gap: 12px;

        }

        .lang-selector.active .lang-dropdown {
            display: block;
        }

        .username {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            padding: 10px;
            color: #fff;
            border-radius: 8px;
            gap: 8px;

        }

        .username>img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .match-box {
            width: 32%;
            text-align: center;
        }

        .match-title {
            color: #fff;
            font-size: 32px;
            margin-bottom: 40px;
        }

        /* ===== Loader Wrapper ===== */

        .loader-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PERFECT CENTER NUMBER */

        .count-number {
            position: absolute;
            color: #fff;
            font-size: 96px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            line-height: 1;
        }

        /* ===== Right Side Segmented Loader ===== */

        .loader {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .tick {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #333;
            bottom: 35%;
            left: 50%;
            transform-origin: center -100px;
            border-radius: 2px;
            opacity: .25;
            animation: activate 10s linear infinite;
        }

        @keyframes activate {
            to {
                background: white;
                opacity: 1;
            }
        }

        /* Text */

        .players-text {
            color: #fff;
            font-size: 20px;
            letter-spacing: 0%;
            margin-bottom: 30px;
            opacity: .8;
        }

        /* Button */

        .accept-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #c76515, #FA8A00);
            border: none;
            padding: 18px 80px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            font-weight: 500;

            clip-path: polygon(0% 0%,
                    100% 0%,
                    100% 75%,
                    92% 100%,
                    8% 100%,
                    0% 75%);

            transition: .3s;
        }



        .accept-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -60%;
            width: 50%;
            height: 100%;

            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.8),
                    transparent);

            transform: skewX(-25deg);
            transition: 0.6s;
        }

        .accept-btn:hover::before {
            left: 130%;
        }



        .accept-btn:hover {
            box-shadow: 0 0 25px rgba(79, 117, 255, .8);
        }


        .match-load {
            width: 100%;
            height: 100vh;
        }

        .match-load-content {
            width: 100%;
            display: flex;
        }

        .left-video {
            width: 35%;
            position: relative;
        }

        .left-video>img {
            position: absolute;
            left: 0;
            top: 5%;
            object-fit: cover;
            z-index: -100;
        }

        .right-video {
            width: 35%;
            z-index: -100;
            position: relative;
        }

        .right-video>img {
            position: absolute;
            right: 0;
            top: 5%;
            object-fit: cover;
        }


        .accept-btn.accepted {
            background: linear-gradient(180deg, #33d17a, #26b463);
            box-shadow: 0 0 30px rgba(51, 209, 122, .8);
            transform: scale(1.05);
        }

        .accept-btn.accepted::after {
            content: " ✓";
        }

        .accept-btn {
            transition: .35s;
        }

        .players-text.match-start {
            color: #33d17a;
            font-weight: bold;
            font-size: 22px;
        }

        .unaccept-btn {
            margin-top: 15px;
            background: linear-gradient(180deg, #ff5c5c, #e04646);
            border: none;
            padding: 14px 60px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            font-weight: 500;

            clip-path: polygon(0% 0%,
                    100% 0%,
                    100% 75%,
                    92% 100%,
                    8% 100%,
                    0% 75%);

            display: none;
            transition: .3s;
        }

        .unaccept-btn:hover {
            box-shadow: 0 0 20px rgba(255, 80, 80, .7);
        }


        @media(min-width:500px) {
            .match-title-mobile {
                display: none;
            }
        }



        @media(max-width:500px) {



            .right-buttons {
                display: none;
            }

            .container {
                padding: 0 16px;

            }



            .left-video {
                width: 100%;
                position: absolute;
                left: 0;
                top: 18%;
            }

            .left-video>img {
                position: static;
        
            }

            ;




            .right-video {
                display: none;
            }

            .match-load {
                width: 100%;
                height: 100vh;

            }

            .match-load-content {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 30px;

            }

            .match-title {
                display: none;
            }

            .match-title-mobile {
                color: #fff;
                display: block;
                position: absolute;
                top: 25%;
                left: 25%;
                font-size: 32px;
            }

            .match-box {
                width: 90%;
                text-align: center;
                display: flex;
                flex-direction: column;
                gap: 30px;
                backdrop-filter: blur(54px);
            }

            .loader {
                backdrop-filter: blur(54px);
                width: 100%;
                height: 100%;
            }

            .loader-wrapper {
                backdrop-filter: blur(54px);
                width: 100%;
                height: 100%;
            }

            .tick {
                position: absolute;
                width: 4px;
                height: 20px;
                background: #333;
                top: 61%;
                left: 50%;
                transform-origin: center -100px;
                border-radius: 2px;
                opacity: .25;
                animation: activate 5s linear infinite;
            }


            .match-title {
                margin-bottom: 120px;
            }

            .players-text {
                display: none;
            }


            .match-box {
                position: absolute;
                top: 32%;
                left: 5%;
                height: 400px;
            }


            .loader-wrapper {
                width: auto;
                backdrop-filter: blur(54px);
                border-radius: 20px;
                padding-top: 40px;
            }

        }
    </style>
    <style>
        .user-dropdown {
            position: fixed;
            top: 70px;
            right: 72px;
            width: 285px;
            background: #00000032;
            backdrop-filter: blur(42px);
            -webkit-backdrop-filter: blur(42px);
            border-radius: 14px;
            padding: 14px;
            z-index: 99999;
            display: none;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .55);
        }

        .header .username.udrop-active .user-dropdown {
            display: block;
        }

        .udrop-rank-box {
            border: 1.5px solid #e4941b;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .udrop-rank-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .udrop-rank-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .udrop-progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .udrop-progress-bar {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, .2);
            border-radius: 5px;
            overflow: hidden;
        }

        .udrop-progress-fill {
            height: 100%;
            width: 75%;
            background: linear-gradient(90deg, #e4941b, #f0b84a);
            border-radius: 5px;
        }

        .udrop-ch-label {
            font-size: 12px;
            font-weight: 700;
            color: #e4941b;
            white-space: nowrap;
        }

        .udrop-balance-box {
            background: rgba(255, 255, 255, .12);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .udrop-balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .udrop-bal-label {
            font-size: 13px;
            color: rgba(255, 255, 255, .8);
        }

        .udrop-bal-amount {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .udrop-coin-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #d0d0d0, #888);
            border: 2px solid #999;
            flex-shrink: 0;
        }

        .udrop-bal-btn {
            width: 100%;
            background: #e4941b;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .udrop-bal-btn:hover {
            background: #cf8218;
        }

        .udrop-menu {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .udrop-menu li a {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, .1);
            border-radius: 8px;
            transition: background .2s;
        }

        .udrop-menu li a:hover {
            background: rgba(255, 255, 255, .18);
        }

        .udrop-exit-item a {
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="./index.html">
                        <img src="./images/cyberplus-logo.svg" alt="logo">
                    </a>
                </div>
                <div class="right-buttons">
                    <div class="lang-selector">
                        <span class="current-lang">AZ</span>
                        <div class="lang-dropdown">
                            <div data-lang="az">AZ</div>
                            <div data-lang="en">EN</div>
                            <div data-lang="ru">RU</div>
                        </div>
                    </div>
                    <div class="username">
                        <img src="./images/userprofil.png" alt="user profil">
                        <p class="profil-name">username</p>
                        <div class="user-dropdown">
                            <div class="udrop-rank-box">
                                <div class="udrop-rank-title">
                                    <img src="./images/suprememaster.png" alt="rank" class="udrop-rank-icon">
                                    <span>Supreme Master First Class</span>
                                </div>
                                <div class="udrop-progress-row">
                                    <div class="udrop-progress-bar">
                                        <div class="udrop-progress-fill"></div>
                                    </div>
                                    <span class="udrop-ch-label">75 CH</span>
                                </div>
                            </div>
                            <div class="udrop-balance-box">
                                <div class="udrop-balance-row">
                                    <span class="udrop-bal-label">Balans:</span>
                                    <span class="udrop-bal-amount">
                                        <span class="udrop-coin-icon"></span>
                                        897 CC
                                    </span>
                                </div>
                                <button class="udrop-bal-btn">&#43; Balansı artır</button>
                            </div>
                            <ul class="udrop-menu">
                                <li><a href="./profile.html">Profil</a></li>
                                <li><a href="#">Inventory</a></li>
                                <li><a href="#">Match history</a></li>
                                <li><a href="#">My Team</a></li>
                                <li><a href="#">My Balance</a></li>
                                <li class="udrop-exit-item"><a href="#">Exit <svg xmlns="http://www.w3.org/2000/svg"
                                            width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                            <polyline points="16 17 21 12 16 7" />
                                            <line x1="21" y1="12" x2="9" y2="12" />
                                        </svg></a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="match-load">
            <div class="container">
                <div class="match-load-content">
                    <div class="left-video">
                        <img src="./images/vol-match-load.png" alt="">
                    </div>
                    <h2 class="match-title-mobile">Match found</h2>
                    <div class="match-box">
                        <div data-translate="match" class="match-title">Match found</div>



                        <div class="loader-wrapper">

                            <div class="loader">

                            </div>

                            <div class="count-number">20</div>

                        </div>

                        <div data-translate="players" class="players-text">0/10 Players are ready</div>

                        <button class="accept-btn">Accept</button>
                        <button class="unaccept-btn">Unaccept</button>

                    </div>
                    <div class="right-video">
                        <img src="./images/vol-match-load-2.png" alt="">
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script>
        const loader = document.currentScript.parentElement;
        const total = 16; // only right half

        for (let i = 0; i <= total; i++) {

            const tick = document.createElement('div');
            tick.classList.add('tick');

            // RIGHT SIDE only: -90° (top) → +90° (bottom)
            let angle = 180 + (i * (180 / total));

            tick.style.transform = `rotate(${angle}deg)`;

            // TOP → DOWN animation order
            tick.style.animationDelay = `${i * (5 / total)}s`;

            loader.appendChild(tick);
        }


        const acceptBtn = document.querySelector(".accept-btn");
        const playersText = document.querySelector(".players-text");

        let playersReady = 0;
        let totalPlayers = 10;
        let playersInterval;

        acceptBtn.addEventListener("click", () => {

            // button animasiya
            acceptBtn.classList.add("accepted");
            acceptBtn.textContent = "Accepted";
            acceptBtn.disabled = true;

            // players sayının artması
            playersInterval = setInterval(() => {

                playersReady++;

                playersText.textContent = playersReady + "/" + totalPlayers + " Players are ready";

                if (playersReady >= totalPlayers) {

                    clearInterval(playersInterval);

                    playersText.textContent = "Match Starting...";
                    playersText.classList.add("match-start");

                }

            }, 800);

        });


        const unacceptBtn = document.querySelector(".unaccept-btn");

        acceptBtn.addEventListener("click", () => {

            acceptBtn.classList.add("accepted");
            acceptBtn.textContent = "Accepted";
            acceptBtn.disabled = true;

            unacceptBtn.style.display = "inline-block";

            playersInterval = setInterval(() => {

                playersReady++;

                playersText.textContent = playersReady + "/" + totalPlayers + " Players are ready";

                if (playersReady >= totalPlayers) {

                    clearInterval(playersInterval);

                    playersText.textContent = "Match Starting...";
                    playersText.classList.add("match-start");

                }

            }, 800);

        });


        unacceptBtn.addEventListener("click", () => {

            clearInterval(playersInterval);

            playersReady = 0;

            acceptBtn.classList.remove("accepted");
            acceptBtn.textContent = "Accept";
            acceptBtn.disabled = false;

            playersText.textContent = "0/10 Players are ready";
            unacceptBtn.style.display = "none";

        });



        const countElement = document.querySelector(".count-number");

        let timeLeft = 20;

        const countdown = setInterval(() => {

            timeLeft--;

            countElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
            }

        }, 1000);

        document.addEventListener("DOMContentLoaded", () => {







            // ================= LANGUAGE SYSTEM =================

            const langSelector = document.querySelector('.lang-selector');
            const currentLang = document.querySelector('.current-lang');
            const langOptions = document.querySelectorAll('.lang-dropdown div');

            const translations = {
                az: {
                    match: "Qarşılaşma tapıldı"

                },
                en: {
                    match: "Match found"
                },
                ru: {
                    match: "Матч найден"

                }
            };

            function applyLanguage(lang) {

                const elements = document.querySelectorAll("[data-translate]");

                elements.forEach(el => {

                    const key = el.dataset.translate;

                    if (translations[lang] && translations[lang][key]) {
                        el.textContent = translations[lang][key];
                    }

                });
            }


            if (langSelector) {

                langSelector.addEventListener('click', () => {
                    langSelector.classList.toggle('active');
                });

                langOptions.forEach(option => {
                    option.addEventListener('click', (e) => {

                        const selectedLang = e.target.dataset.lang;

                        currentLang.textContent = selectedLang.toUpperCase();

                        localStorage.setItem("siteLang", selectedLang);

                        langSelector.classList.remove('active');

                        applyLanguage(selectedLang);
                    });
                });

            }

            // səhifə açılarkən dili load et

            const savedLang = localStorage.getItem("siteLang") || "az";

            if (currentLang) {
                currentLang.textContent = savedLang.toUpperCase();
            }

            applyLanguage(savedLang);

        });




    </script>
    <script>
        (function () {
            var u = document.querySelector('.header .username');
            var d = document.querySelector('.user-dropdown');
            if (u && d) {
                u.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var open = u.classList.toggle('udrop-active');
                    if (open) {
                        var r = u.getBoundingClientRect();
                        d.style.top = (r.bottom + 8) + 'px';
                        d.style.right = (window.innerWidth - r.right) + 'px';
                    }
                });
                document.addEventListener('click', function (e) {
                    if (!u.contains(e.target)) u.classList.remove('udrop-active');
                });
            }
        })();
    </script>
</body>

</html>
