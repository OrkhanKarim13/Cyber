        * {

            margin: 0;
            text-decoration: none;

        body {

        .steam-btn>a {

            ;

        .lang-selector {

            font-weight: 600;
            background: rgba(255, 255, 255, 0.12);
            padding: 10px;
            color: #fff;
            border-radius: 8px;
        }

        .lang-dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            background: white;
            border: 1px solid #ddd;
            display: none;
            min-width: 60px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 8px;
        }

        .lang-dropdown div {
            padding: 6px 10px;
            color: color;
        }

        .lang-dropdown div:hover {
            background: #f2f2f2;
            color: #000;
            border-radius: 8px;
        }

        .lang-selector.active .lang-dropdown {

        }

        .right-buttons {

            align-items: center;
            gap: 12px;

        }

        .lang-selector.active .lang-dropdown {

        }

        .username {
            display: flex;
            align-items: center;

            gap: 8px;

        .username>img {

        }

        .match-box {

        }

        .match-title {

            margin-bottom: 40px;
        }


        .loader-wrapper {

            width: 260px;
            height: 260px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }



        .count-number {
            position: absolute;
            color: #fff;
            font-size: 96px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            line-height: 1;
        }


        .loader {
            position: absolute;
            width: 100%;
      
        }

        .tick {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #333;
            bottom: 40%;
            left: 50%;
            transform-origin: center -100px;
            border-radius: 2px;
            opacity: .25;
            animation: activate 5s linear infinite;
        }

        @keyframes activate {
            to {
                background: white;
                opacity: 1;
            }
        }


        .players-text {
            color: #fff;
            font-size: 20px;
            letter-spacing: 0%;
            margin-bottom: 30px;
            opacity: .8;
        }


        .accept-btn {

            font-size: 18px;
            color: white;
            cursor: pointer;
            font-weight: 500;

                    8% 100%,

        }

        .accept-btn:hover {

        }


        .match-load {

        }

        .match-load-content {

        }





        /* ======================================================= */

        .wrapper {

            max-width: 1100px;
            text-align: center;
        }


        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 6px;
            margin-bottom: 32px;
            color: #fff;
        }


        .progress-box {
            display: inline-block;
            
            padding: 30px 40px;
            position: relative;
        }

        .progress-inner {
            display: flex;
            gap: 4px;
        }

        .bar {
            width: 10px;
            height: 32px;
            background: #3a3326;
            border-radius: 1px;
        }

        .bar.active {
            background: #FA8A00;
        }




        .progress-box::before,
        .progress-box::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid #d6b874;
        }

        .progress-box::before {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .progress-box::after {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }

        .progress-bottom-left,
        .progress-bottom-right {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid #d6b874;
            bottom: 10px;
        }

        .progress-bottom-left {
            left: 10px;
            border-right: none;
            border-top: none;
        }

        .progress-bottom-right {
            right: 10px;
            border-left: none;
            border-top: none;
        }

        .hh {
            font-family: 'Orbitron', sans-serif;
            color: #d6b874;
            font-size: 20px;
            letter-spacing: 2px;
        }

            justify-content: center;
            gap: 8px;
            margin-bottom: 70px;
        }

        .card {

            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: .3s;
        }

        .card.active {
            background: linear-gradient(145deg, #1a1a1a, #121212);
            box-shadow: 0 0 0 1px rgba(214, 184, 116, 0.5);
        }

            margin-bottom: 18px;
        }

        .card p {

            font-size: 16px;
            font-weight: 500;
            line-height: 1.3;

        }

        /* ================= BUTTON ================= */

        .find-btn {
            width: 420px;
            margin: 0 auto;
            background: linear-gradient(180deg, #c76515, #FA8A00);
            padding: 20px;
            font-size: 20px;
            font-weight: 500;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            clip-path: polygon(0% 0%,
                    100% 0%,
                    100% 75%,
                    94% 100%,
                    6% 100%,
                    0% 75%);
            box-shadow: 0 15px 0 #3657d6;
            transition: .3s;
            position: relative;
        }


        

.find-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -60%;
    width: 50%;
    height: 100%;
    
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.8),
        transparent
    );

    transform: skewX(-25deg);
    transition: 0.6s;
}

.find-btn:hover::before {
    left: 100%;
}


        .find-btn:hover {
            box-shadow: 0 18px 25px rgba(79, 117, 255, 0.6);
        }

        .find-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            stroke-width: 2;
            fill: none;

    <script>





        document.addEventListener("DOMContentLoaded", () => {









            // ================= LANGUAGE SYSTEM =================

            const langSelector = document.querySelector('.lang-selector');
            const currentLang = document.querySelector('.current-lang');
            const langOptions = document.querySelectorAll('.lang-dropdown div');

            const translations = {
                az: {
                    match: "Qarşılaşma tapıldı"

                },
                en: {
                    match: "Match found"
                },
                ru: {
                    match: "Матч найден"

                }
            };

            function applyLanguage(lang) {

                const elements = document.querySelectorAll("[data-translate]");

                elements.forEach(el => {

                    const key = el.dataset.translate;

                    if (translations[lang] && translations[lang][key]) {
                        el.textContent = translations[lang][key];
                    }

                });
            }


            if (langSelector) {

                langSelector.addEventListener('click', () => {
                    langSelector.classList.toggle('active');
                });

                langOptions.forEach(option => {
                    option.addEventListener('click', (e) => {

                        const selectedLang = e.target.dataset.lang;

                        currentLang.textContent = selectedLang.toUpperCase();

                        localStorage.setItem("siteLang", selectedLang);

                        langSelector.classList.remove('active');

                        applyLanguage(selectedLang);
                    });
                });

            }

            // səhifə açılarkən dili load et

            const savedLang = localStorage.getItem("siteLang") || "az";

            if (currentLang) {
                currentLang.textContent = savedLang.toUpperCase();
            }

            applyLanguage(savedLang);

        });




    </script>
    <script>
        (function() {
            var u = document.querySelector('.header .username');
            var d = document.querySelector('.user-dropdown');
            if (u && d) {
                u.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = u.classList.toggle('udrop-active');
                    if (open) {
                        var r = u.getBoundingClientRect();
                        d.style.top = (r.bottom + 8) + 'px';
                        d.style.right = (window.innerWidth - r.right) + 'px';
                    }
                });
                document.addEventListener('click', function(e) {
                    if (!u.contains(e.target)) u.classList.remove('udrop-active');
                });
            }
        })();
    </script>
